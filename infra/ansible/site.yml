- name: Harden all nodes
  hosts: k3s_cluster
  become: true
  roles:
    - hardening

- name: Install k3s server
  hosts: server
  become: true
  roles:
    - k3s-server

- name: Join k3s agents
  hosts: agents
  become: true
  roles:
    - k3s-agent

- name: Fetch kubeconfig
  hosts: server
  become: true
  tasks:
    - name: Read k3s kubeconfig
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw

    - name: Write kubeconfig with public server address
      ansible.builtin.copy:
        content: "{{ (kubeconfig_raw.content | b64decode) | regex_replace('https://127.0.0.1:6443', 'https://' ~ ansible_host ~ ':6443') }}"
        dest: "{{ playbook_dir }}/kubeconfig"
        mode: "0600"
      become: false
      delegate_to: localhost
