- name: Check whether k3s server is installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Ensure k3s config directory exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Configure k3s server
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
    content: |
      disable:
        - traefik
      write-kubeconfig-mode: "0644"
      tls-san:
        - "{{ ansible_host }}"
        - "{{ private_ip }}"
  notify: Restart k3s

- name: Install k3s server
  ansible.builtin.shell: >
    curl -sfL {{ k3s_install_url }} |
    INSTALL_K3S_VERSION={{ k3s_version }}
    sh -s - server {{ k3s_server_extra_args | join(' ') }}
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Wait for node token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 120

- name: Read k3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  no_log: true

- name: Save token as host fact for agents
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"
  no_log: true
